<!DOCTYPE html>
<html lang="id" class="scroll-smooth">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <!-- Keamanan Meta Strict -->
    <meta http-equiv="X-XSS-Protection" content="1; mode=block">
    <meta http-equiv="X-Content-Type-Options" content="nosniff">
    <meta name="referrer" content="strict-origin-when-cross-origin">
    <meta name="theme-color" content="#ffffff">
    
    <title>Masuk / Daftar | Dazer Analytics</title>
    
    <!-- Libraries -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://accounts.google.com/gsi/client" async defer></script>

    <!-- ANTI CLICKJACKING SCRIPT -->
    <script>
        try {
            if (window.top !== window.self) {
                window.top.location = window.self.location;
            }
        } catch (err) {
            console.warn("Skrip anti-clickjacking disekat oleh keselamatan iframe pratinjau.");
        }
    </script>

    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        brand: {
                            50: '#f0f9ff', 100: '#e0f2fe', 200: '#bae6fd', 300: '#7dd3fc', 400: '#38bdf8',
                            500: '#0ea5e9', 600: '#0284c7', 700: '#0369a1', 800: '#075985', 900: '#0f172a',
                        }
                    },
                    fontFamily: { sans: ['Inter', 'system-ui', 'sans-serif'] }
                }
            }
        }
    </script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap');
        
        body {
            font-family: 'Inter', sans-serif; 
            background-color: #f8fafc;
            background-image: radial-gradient(circle at top center, #ffffff 0%, transparent 100%);
            background-attachment: fixed; 
            display: flex; 
            min-height: 100vh; 
            flex-direction: column;
        }

        .glass-card {
            background: #ffffff; 
            border: 1px solid #e2e8f0;
            box-shadow: 0 10px 25px -5px rgba(15, 23, 42, 0.08);
            border-radius: 1.25rem; 
            transition: all 0.3s ease;
            overflow: hidden;
        }

        .auth-input {
            width: 100%; font-size: 13px; font-weight: 600; color: #1e293b; background-color: #f8fafc;
            border: 1.5px solid #e2e8f0; border-radius: 0.75rem; 
            padding: 0.65rem 1rem 0.65rem 2.5rem; 
            outline: none; transition: all 0.2s ease;
        }
        .auth-input:focus { border-color: #0ea5e9; background-color: #ffffff; box-shadow: 0 0 0 3px rgba(14, 165, 233, 0.1); }

        .btn-primary {
            width: 100%; padding: 0.7rem; border-radius: 0.75rem; font-weight: 800; font-size: 13px;
            text-transform: uppercase; letter-spacing: 0.5px; background: #0ea5e9; color: white;
            transition: all 0.2s ease; box-shadow: 0 4px 12px rgba(14, 165, 233, 0.25);
        }
        .btn-primary:active { transform: scale(0.98); }
        .btn-primary:hover:not(:disabled) { background: #0284c7; transform: translateY(-1px); box-shadow: 0 6px 16px rgba(14, 165, 233, 0.35); }
        .btn-primary:disabled { opacity: 0.6; cursor: not-allowed; transform: none; box-shadow: none; }

        .tab-btn {
            flex: 1; padding: 0.75rem; font-size: 11px; font-weight: 800; color: #94a3b8;
            border-bottom: 2px solid transparent; transition: all 0.2s ease; text-transform: uppercase;
        }
        .tab-btn.active { color: #0ea5e9; border-bottom-color: #0ea5e9; background-color: #f0f9ff; }
        
        .fade-in { animation: fadeIn 0.4s ease-out forwards; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }

        #google-btn-container { min-height: 40px; display: flex; justify-content: center; width: 100%; }
        
        .loader-spin { animation: spin 1s linear infinite; }
        @keyframes spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
    </style>
</head>
<body class="antialiased selection:bg-brand-100">

    <!-- Header -->
    <nav class="w-full bg-white/80 backdrop-blur-md border-b border-slate-100 fixed top-0 z-50">
        <div class="max-w-7xl mx-auto px-4 h-14 flex justify-between items-center"> 
            <!-- PENGALIHAN URL BERSIH -->
            <button onclick="window.location.href='/'" class="flex items-center gap-2 group">
                <div class="bg-slate-50 p-1.5 rounded-full border border-slate-200 group-hover:bg-brand-50 transition-colors">
                    <i data-lucide="arrow-left" class="w-4 h-4 text-slate-500 group-hover:text-brand-600"></i>
                </div>
                <span class="font-bold text-xs text-slate-600">Beranda</span>
            </button>
            <div class="flex items-center gap-2">
                <i data-lucide="bar-chart-2" class="text-brand-500 w-5 h-5"></i>
                <span class="font-black text-lg tracking-tighter">Dazer</span>
            </div>
        </div>
    </nav>

    <!-- Main -->
    <main class="flex-grow flex items-center justify-center p-4 pt-20 pb-8">
        <div class="w-full max-w-[380px]">
            
            <!-- Auto-Login State -->
            <div id="auto-login-overlay" class="hidden glass-card p-8 text-center flex flex-col items-center justify-center animate-pulse">
                <div class="w-16 h-16 bg-brand-50 rounded-full flex items-center justify-center mb-4 border border-brand-100">
                    <i data-lucide="user-check" class="w-8 h-8 text-brand-500"></i>
                </div>
                <h2 class="text-lg font-black text-slate-900">Sesi Aktif</h2>
                <p class="text-xs text-slate-500 mt-1 font-medium">Menyinkronkan data profil Anda...</p>
            </div>

            <!-- Main Auth Card -->
            <div id="auth-card" class="glass-card fade-in">
                <div class="flex border-b border-slate-100" id="auth-tabs">
                    <button id="tab-login" onclick="switchTab('login')" class="tab-btn active">Masuk</button>
                    <button id="tab-register" onclick="switchTab('register')" class="tab-btn">Daftar</button>
                </div>

                <div class="p-5 sm:p-6">
                    <div class="text-center mb-6"> 
                        <h1 id="auth-title" class="text-xl font-black text-slate-900 tracking-tight">Selamat Datang</h1>
                        <p id="auth-subtitle" class="text-xs font-medium text-slate-400 mt-1">Akses penuh ke Studio Modeling.</p>
                    </div>

                    <!-- Login Form -->
                    <form id="form-login" onsubmit="handleAuth(event, 'login')" class="space-y-3">
                        <div class="relative group">
                            <i data-lucide="mail" class="w-4 h-4 text-slate-400 absolute left-3.5 top-1/2 -translate-y-1/2 group-focus-within:text-brand-500 transition-colors"></i>
                            <input type="email" id="login-email" class="auth-input" placeholder="Email" required>
                        </div>
                        <div class="relative group">
                            <i data-lucide="lock" class="w-4 h-4 text-slate-400 absolute left-3.5 top-1/2 -translate-y-1/2 group-focus-within:text-brand-500 transition-colors"></i>
                            <input type="password" id="login-password" class="auth-input" placeholder="Password" required>
                        </div>
                        <div class="flex justify-end pt-1">
                            <button type="button" onclick="forgotPassword()" class="text-[11px] font-extrabold text-brand-600 hover:text-brand-700 transition-colors">Lupa Password?</button>
                        </div>
                        <button type="submit" id="btn-login" class="btn-primary flex items-center justify-center gap-2 mt-2">
                            <span>Masuk ke Dasbor</span> <i data-lucide="arrow-right" class="w-3.5 h-3.5"></i>
                        </button>
                    </form>

                    <!-- Register Form -->
                    <form id="form-register" onsubmit="handleAuth(event, 'register')" class="space-y-3 hidden">
                        <div class="relative group">
                            <i data-lucide="user" class="w-4 h-4 text-slate-400 absolute left-3.5 top-1/2 -translate-y-1/2 group-focus-within:text-brand-500 transition-colors"></i>
                            <input type="text" id="reg-name" class="auth-input" placeholder="Nama Lengkap" required>
                        </div>
                        <div class="relative group">
                            <i data-lucide="mail" class="w-4 h-4 text-slate-400 absolute left-3.5 top-1/2 -translate-y-1/2 group-focus-within:text-brand-500 transition-colors"></i>
                            <input type="email" id="reg-email" class="auth-input" placeholder="Alamat Email" required>
                        </div>
                        <div class="relative group">
                            <i data-lucide="lock" class="w-4 h-4 text-slate-400 absolute left-3.5 top-1/2 -translate-y-1/2 group-focus-within:text-brand-500 transition-colors"></i>
                            <input type="password" id="reg-password" class="auth-input" placeholder="Password (Min. 6 Kar.)" required minlength="6">
                        </div>
                        <button type="submit" id="btn-register" class="btn-primary mt-2">Buat Akun Gratis</button>
                    </form>

                    <!-- Reset Password Form -->
                    <form id="form-reset" onsubmit="handleResetPassword(event)" class="space-y-3 hidden">
                        <div class="bg-brand-50 p-3 rounded-lg border border-brand-100 mb-3">
                            <p class="text-[11px] text-brand-700 font-bold leading-relaxed text-center">
                                <i data-lucide="shield-check" class="w-3.5 h-3.5 inline-block mr-1"></i>
                                Memulihkan: <span id="reset-email-display" class="underline"></span>
                            </p>
                        </div>
                        <div class="relative group">
                            <i data-lucide="lock" class="w-4 h-4 text-slate-400 absolute left-3.5 top-1/2 -translate-y-1/2 group-focus-within:text-brand-500 transition-colors"></i>
                            <input type="password" id="reset-new-password" class="auth-input pr-10" placeholder="Sandi Baru" required minlength="6">
                            <button type="button" onclick="togglePasswordVisibility('reset-new-password', 'eye-new')" class="absolute right-3.5 top-1/2 -translate-y-1/2 text-slate-400 hover:text-slate-600 outline-none">
                                <i data-lucide="eye" id="eye-new" class="w-4 h-4"></i>
                            </button>
                        </div>
                        <div class="relative group">
                            <i data-lucide="lock-keyhole" class="w-4 h-4 text-slate-400 absolute left-3.5 top-1/2 -translate-y-1/2 group-focus-within:text-brand-500 transition-colors"></i>
                            <input type="password" id="reset-confirm-password" class="auth-input pr-10" placeholder="Konfirmasi Sandi" required minlength="6">
                            <button type="button" onclick="togglePasswordVisibility('reset-confirm-password', 'eye-confirm')" class="absolute right-3.5 top-1/2 -translate-y-1/2 text-slate-400 hover:text-slate-600 outline-none">
                                <i data-lucide="eye" id="eye-confirm" class="w-4 h-4"></i>
                            </button>
                        </div>
                        <button type="submit" id="btn-reset" class="btn-primary mt-2">Simpan & Masuk</button>
                    </form>

                    <!-- Divider -->
                    <div id="auth-divider" class="relative my-5">
                        <div class="absolute inset-0 flex items-center"><div class="w-full border-t border-slate-100"></div></div>
                        <div class="relative flex justify-center text-[9px] uppercase font-black tracking-widest text-slate-300"><span class="bg-white px-3">Atau</span></div>
                    </div>

                    <!-- Google GSI -->
                    <div id="google-btn-container" class="w-full flex justify-center"></div>

                    <p class="text-center text-[9px] text-slate-400 font-medium mt-6 leading-relaxed">
                        Data aman bersama Dazer.<br/>Dilindungi enkripsi Google OAuth 2.0.
                    </p>
                </div>
            </div>
        </div>
    </main>

    <!-- Notifications -->
    <div id="notification" class="hidden fixed top-6 left-1/2 -translate-x-1/2 z-[9999] bg-slate-900 text-white px-5 py-2.5 rounded-full flex items-center gap-2.5 shadow-2xl transition-all duration-300 text-xs font-bold border border-slate-700">
        <i data-lucide="info" class="w-4 h-4 text-brand-400" id="notification-icon"></i>
        <p id="notification-text"></p>
    </div>

    <script>
        lucide.createIcons();
        const GOOGLE_CLIENT_ID = "403594078276-ukuks77pis0bclh9i3ab0j5d1m1tsmmv.apps.googleusercontent.com";
        const API_URL = "/.netlify/functions/dazer-api";

        // ANTI-SPAM LOCK & SECURITY SANITIZER
        let isProcessing = false;

        function sanitizeHTML(str) {
            if(!str) return '';
            return str.replace(/[<>&'"]/g, function (c) {
                switch (c) {
                    case '<': return '&lt;';
                    case '>': return '&gt;';
                    case '&': return '&amp;';
                    case '\'': return '&#39;';
                    case '"': return '&quot;';
                }
            });
        }

        window.onload = () => {
            const urlParams = new URLSearchParams(window.location.search);
            const isResetRequest = sanitizeHTML(urlParams.get('reset')) === 'true';
            const emailTarget = sanitizeHTML(urlParams.get('email'));

            if (isResetRequest && emailTarget) {
                showResetMode(emailTarget);
                return;
            }

            const token = localStorage.getItem('Dazer_Secure_JWT');
            if(token) {
                try {
                    const payload = JSON.parse(atob(token.split('.')[1]));
                    if(Date.now() - payload.issuedAt < 2592000000) {
                        document.getElementById('auth-card').classList.add('hidden');
                        document.getElementById('auto-login-overlay').classList.remove('hidden');
                        // PENGALIHAN URL BERSIH
                        setTimeout(() => window.location.href = '/', 1200);
                        return;
                    }
                } catch(e) {}
            }

            if (typeof google !== 'undefined') {
                google.accounts.id.initialize({ client_id: GOOGLE_CLIENT_ID, callback: handleGoogleResponse });
                google.accounts.id.renderButton(document.getElementById("google-btn-container"), { 
                    theme: "outline", size: "large", width: "100%", shape: "pill", text: "continue_with" 
                });
            }
        };

        function showResetMode(email) {
            document.getElementById('auth-tabs').classList.add('hidden');
            document.getElementById('form-login').classList.add('hidden');
            document.getElementById('form-register').classList.add('hidden');
            document.getElementById('auth-divider').classList.add('hidden');
            document.getElementById('google-btn-container').classList.add('hidden');
            
            document.getElementById('form-reset').classList.remove('hidden');
            document.getElementById('auth-title').innerText = "Atur Ulang Sandi";
            document.getElementById('auth-subtitle').innerText = "Keamanan akun adalah prioritas.";
            document.getElementById('reset-email-display').innerText = email;
            showNotification("Link pemulihan diverifikasi.", "success");
        }

        function togglePasswordVisibility(inputId, iconId) {
            const input = document.getElementById(inputId);
            const icon = document.getElementById(iconId);
            if (input.type === 'password') {
                input.type = 'text';
                icon.setAttribute('data-lucide', 'eye-off');
            } else {
                input.type = 'password';
                icon.setAttribute('data-lucide', 'eye');
            }
            lucide.createIcons();
        }

        async function handleResetPassword(e) {
            e.preventDefault();
            if(isProcessing) return;
            isProcessing = true;

            const pass = document.getElementById('reset-new-password').value;
            const confirm = document.getElementById('reset-confirm-password').value;
            const email = document.getElementById('reset-email-display').innerText;

            if (pass !== confirm) {
                isProcessing = false;
                return showNotification("Konfirmasi sandi tidak sesuai.", "error");
            }
            
            const btn = document.getElementById('btn-reset');
            btn.disabled = true;
            btn.innerText = "Menyimpan...";

            const userData = { name: "User Dazer", email: email, tier: 'registered', analysisQuota: 2, chatQuota: 5, modelQuota: 1, issuedAt: Date.now() };
            localStorage.setItem('Dazer_Secure_JWT', generateLocalJWT(userData));
            
            showNotification("Sandi diperbarui! Masuk ke Dasbor...", "success");
            // PENGALIHAN URL BERSIH
            setTimeout(() => window.location.href = "/?auth=success", 1200);
        }

        async function handleGoogleResponse(response) {
            if(isProcessing) return;
            isProcessing = true;

            try {
                const base64Url = response.credential.split('.')[1];
                const payload = JSON.parse(atob(base64Url.replace(/-/g, '+').replace(/_/g, '/')));
                
                showNotification("Otentikasi Berhasil!", "success");
                const userData = { name: sanitizeHTML(payload.name), email: sanitizeHTML(payload.email), picture: sanitizeHTML(payload.picture), tier: 'registered', analysisQuota: 2, chatQuota: 5, modelQuota: 1, issuedAt: Date.now() };
                localStorage.setItem('Dazer_Secure_JWT', generateLocalJWT(userData));
                await notifyServer('notify_register', userData);
                // PENGALIHAN URL BERSIH
                setTimeout(() => window.location.href = "/?auth=success", 800);
            } catch (e) {
                isProcessing = false;
                showNotification("Validasi Google Gagal.", "error");
            }
        }

        function switchTab(tab) {
            const loginF = document.getElementById('form-login'), regF = document.getElementById('form-register');
            const loginT = document.getElementById('tab-login'), regT = document.getElementById('tab-register');
            const title = document.getElementById('auth-title'), sub = document.getElementById('auth-subtitle');
            if(tab === 'login') {
                loginF.classList.remove('hidden'); regF.classList.add('hidden');
                loginT.classList.add('active'); regT.classList.remove('active');
                title.innerText = "Selamat Datang";
                sub.innerText = "Akses penuh ke Studio Modeling.";
            } else {
                regF.classList.remove('hidden'); loginF.classList.add('hidden');
                regT.classList.add('active'); loginT.classList.remove('active');
                title.innerText = "Buat Akun Baru";
                sub.innerText = "Dapatkan kuota profesional gratis.";
            }
            lucide.createIcons();
        }

        async function notifyServer(action, user) {
            try {
                const geoRes = await fetch('https://get.geojs.io/v1/ip/geo.json');
                const geo = geoRes.ok ? await geoRes.json() : {};
                const metadata = { ip: sanitizeHTML(geo.ip) || "Unknown", location: `${sanitizeHTML(geo.city) || ''}, ${sanitizeHTML(geo.country) || ''}`, device: navigator.userAgent, isp: sanitizeHTML(geo.organization) || "Unknown", time: new Date().toLocaleString('id-ID') };
                await fetch(API_URL, { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ action, name: user.name, email: user.email, metadata }) });
            } catch(e) {}
        }

        async function handleAuth(e, type) {
            e.preventDefault();
            if(isProcessing) return;
            isProcessing = true;

            const btn = document.getElementById(type === 'login' ? 'btn-login' : 'btn-register');
            
            // Sanitasi ketat untuk mencegah XSS
            const email = sanitizeHTML(document.getElementById(type === 'login' ? 'login-email' : 'reg-email').value);
            const name = type === 'register' ? sanitizeHTML(document.getElementById('reg-name').value) : "User Dazer";
            
            btn.disabled = true;
            btn.innerText = "Memuat...";
            
            const userData = { name: name, email: email, tier: 'registered', analysisQuota: 2, chatQuota: 5, modelQuota: 1, issuedAt: Date.now() };
            localStorage.setItem('Dazer_Secure_JWT', generateLocalJWT(userData));
            
            if(type === 'register') await notifyServer('notify_register', userData);
            
            showNotification("Berhasil! Mengalihkan...", "success");
            // PENGALIHAN URL BERSIH
            setTimeout(() => window.location.href = "/?auth=success", 1000);
        }

        async function forgotPassword() {
            if(isProcessing) return;
            
            const email = sanitizeHTML(document.getElementById('login-email').value);
            if(!email) return showNotification("Masukkan email Anda di kotak login.", "error");
            
            isProcessing = true;
            showNotification("Mengirim instruksi...", "info");
            
            try {
                const res = await fetch(API_URL, { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ action: 'forgot_password', email }) });
                const data = await res.json();
                if(data.message) showNotification(data.message, "success");
                else showNotification("Gagal memproses email.", "error");
            } catch(e) { 
                showNotification("Terjadi kendala server.", "error"); 
            } finally {
                setTimeout(() => { isProcessing = false; }, 3000); // Cooldown perlindungan Anti-Spam
            }
        }

        function generateLocalJWT(payload) {
            return btoa(JSON.stringify({alg: "HS256"})) + "." + btoa(JSON.stringify(payload)) + "." + btoa("dazer-secure-key");
        }

        function showNotification(msg, type='info') {
            const n = document.getElementById('notification'), t = document.getElementById('notification-text'), i = document.getElementById('notification-icon');
            if(!n) return;
            t.innerText = msg;
            i.className = `w-4 h-4 ${type === 'error' ? 'text-rose-400' : (type === 'success' ? 'text-emerald-400' : 'text-brand-400')}`;
            i.setAttribute('data-lucide', type === 'error' ? 'alert-circle' : 'info');
            n.classList.remove('hidden', 'opacity-0'); n.classList.add('flex', 'opacity-100');
            lucide.createIcons();
            
            setTimeout(() => {
                if (n) {
                    n.classList.replace('opacity-100', 'opacity-0');
                    setTimeout(() => n.classList.add('hidden'), 300);
                }
            }, 7000);
        }
    </script>
</body>
</html>
