<!DOCTYPE html>
<html lang="id" class="scroll-smooth">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta http-equiv="X-XSS-Protection" content="1; mode=block">
    <meta http-equiv="X-Content-Type-Options" content="nosniff">
    <meta name="theme-color" content="#ffffff">
    
    <title>Masuk / Daftar | Dazer Analytics</title>
    
    <!-- Libraries -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://accounts.google.com/gsi/client" async defer></script>

    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        brand: {
                            50: '#f0f9ff', 100: '#e0f2fe', 200: '#bae6fd', 300: '#7dd3fc', 400: '#38bdf8',
                            500: '#0ea5e9', 600: '#0284c7', 700: '#0369a1', 800: '#075985', 900: '#0f172a',
                        }
                    },
                    fontFamily: { sans: ['Inter', 'system-ui', 'sans-serif'] }
                }
            }
        }
    </script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap');
        
        body {
            font-family: 'Inter', sans-serif; 
            background-color: #f8fafc;
            background-image: radial-gradient(circle at top center, #ffffff 0%, transparent 100%);
            background-attachment: fixed; 
            display: flex; 
            min-height: 100vh; 
            flex-direction: column;
        }

        .glass-card {
            background: #ffffff; 
            border: 1px solid #e2e8f0;
            box-shadow: 0 10px 25px -5px rgba(15, 23, 42, 0.08);
            border-radius: 1.5rem; 
            transition: all 0.4s ease;
            overflow: hidden;
        }

        .auth-input {
            width: 100%; font-size: 14px; font-weight: 600; color: #1e293b; background-color: #f8fafc;
            border: 1.5px solid #e2e8f0; border-radius: 1rem; padding: 0.85rem 1rem 0.85rem 2.75rem;
            outline: none; transition: all 0.2s ease;
        }
        .auth-input:focus { border-color: #0ea5e9; background-color: #ffffff; box-shadow: 0 0 0 4px rgba(14, 165, 233, 0.1); }

        .btn-primary {
            width: 100%; padding: 0.85rem; border-radius: 1rem; font-weight: 800; font-size: 13px;
            text-transform: uppercase; letter-spacing: 0.5px; background: #0ea5e9; color: white;
            transition: all 0.3s ease; box-shadow: 0 4px 15px rgba(14, 165, 233, 0.35);
        }
        .btn-primary:hover:not(:disabled) { background: #0284c7; transform: translateY(-1px); box-shadow: 0 6px 20px rgba(14, 165, 233, 0.45); }
        .btn-primary:disabled { opacity: 0.6; cursor: not-allowed; }

        .tab-btn {
            flex: 1; padding: 1rem; font-size: 12px; font-weight: 800; color: #94a3b8;
            border-bottom: 3px solid transparent; transition: all 0.3s ease; text-transform: uppercase;
        }
        .tab-btn.active { color: #0ea5e9; border-bottom-color: #0ea5e9; background-color: #f0f9ff; }
        
        .fade-in { animation: fadeIn 0.5s ease-out forwards; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        #google-btn-container { min-height: 44px; display: flex; justify-content: center; width: 100%; }
    </style>
</head>
<body class="antialiased selection:bg-brand-100">

    <!-- Header -->
    <nav class="w-full bg-white/80 backdrop-blur-md border-b border-slate-100 fixed top-0 z-50">
        <div class="max-w-7xl mx-auto px-4 h-16 flex justify-between items-center">
            <button onclick="window.location.href='index.html'" class="flex items-center gap-2 group">
                <div class="bg-slate-50 p-2 rounded-full border border-slate-200 group-hover:bg-brand-50 transition-colors">
                    <i data-lucide="arrow-left" class="w-4 h-4 text-slate-500 group-hover:text-brand-600"></i>
                </div>
                <span class="font-bold text-sm text-slate-600">Beranda</span>
            </button>
            <div class="flex items-center gap-2">
                <i data-lucide="bar-chart-2" class="text-brand-600 w-6 h-6"></i>
                <span class="font-black text-xl tracking-tighter">Dazer</span>
            </div>
        </div>
    </nav>

    <!-- Main -->
    <main class="flex-grow flex items-center justify-center p-4 pt-24 pb-12">
        <div class="w-full max-w-[420px]">
            
            <!-- Auto-Login State -->
            <div id="auto-login-overlay" class="hidden glass-card p-12 text-center flex flex-col items-center justify-center animate-pulse">
                <div class="w-20 h-20 bg-brand-50 rounded-full flex items-center justify-center mb-6 border border-brand-100">
                    <i data-lucide="user-check" class="w-10 h-10 text-brand-500"></i>
                </div>
                <h2 class="text-xl font-black text-slate-900">Sesi Aktif</h2>
                <p class="text-xs text-slate-500 mt-2 font-medium">Menyinkronkan data profil Anda...</p>
            </div>

            <!-- Main Auth Card -->
            <div id="auth-card" class="glass-card fade-in">
                <div class="flex border-b border-slate-100">
                    <button id="tab-login" onclick="switchTab('login')" class="tab-btn active">Masuk</button>
                    <button id="tab-register" onclick="switchTab('register')" class="tab-btn">Daftar</button>
                </div>

                <div class="p-6 sm:p-10">
                    <div class="text-center mb-10">
                        <h1 id="auth-title" class="text-2xl font-black text-slate-900 tracking-tight">Selamat Datang</h1>
                        <p id="auth-subtitle" class="text-xs font-medium text-slate-400 mt-2">Masuk untuk akses penuh ke Studio Modeling.</p>
                    </div>

                    <!-- Login -->
                    <form id="form-login" onsubmit="handleAuth(event, 'login')" class="space-y-4">
                        <div class="relative">
                            <i data-lucide="mail" class="w-4 h-4 text-slate-400 absolute left-4 top-1/2 -translate-y-1/2"></i>
                            <input type="email" id="login-email" class="auth-input" placeholder="Email" required>
                        </div>
                        <div class="relative">
                            <i data-lucide="lock" class="w-4 h-4 text-slate-400 absolute left-4 top-1/2 -translate-y-1/2"></i>
                            <input type="password" id="login-password" class="auth-input" placeholder="Password" required>
                        </div>
                        <div class="flex justify-end">
                            <button type="button" onclick="forgotPassword()" class="text-[11px] font-extrabold text-brand-600 hover:text-brand-700 transition-colors">Lupa Password?</button>
                        </div>
                        <button type="submit" id="btn-login" class="btn-primary flex items-center justify-center gap-2">
                            <span>Masuk ke Dasbor</span> <i data-lucide="arrow-right" class="w-4 h-4"></i>
                        </button>
                    </form>

                    <!-- Register -->
                    <form id="form-register" onsubmit="handleAuth(event, 'register')" class="space-y-4 hidden">
                        <div class="relative">
                            <i data-lucide="user" class="w-4 h-4 text-slate-400 absolute left-4 top-1/2 -translate-y-1/2"></i>
                            <input type="text" id="reg-name" class="auth-input" placeholder="Nama Lengkap" required>
                        </div>
                        <div class="relative">
                            <i data-lucide="mail" class="w-4 h-4 text-slate-400 absolute left-4 top-1/2 -translate-y-1/2"></i>
                            <input type="email" id="reg-email" class="auth-input" placeholder="Alamat Email" required>
                        </div>
                        <div class="relative">
                            <i data-lucide="lock" class="w-4 h-4 text-slate-400 absolute left-4 top-1/2 -translate-y-1/2"></i>
                            <input type="password" id="reg-password" class="auth-input" placeholder="Password (Min. 6 Karakter)" required minlength="6">
                        </div>
                        <button type="submit" id="btn-register" class="btn-primary">Buat Akun Gratis</button>
                    </form>

                    <!-- Divider -->
                    <div class="relative my-8">
                        <div class="absolute inset-0 flex items-center"><div class="w-full border-t border-slate-100"></div></div>
                        <div class="relative flex justify-center text-[10px] uppercase font-black tracking-widest text-slate-300"><span class="bg-white px-4">Atau</span></div>
                    </div>

                    <!-- Google GSI -->
                    <div id="google-btn-container" class="w-full flex justify-center"></div>

                    <p class="text-center text-[10px] text-slate-400 font-medium mt-10 leading-relaxed">
                        Data Anda aman bersama Dazer.<br/>Otentikasi dilindungi enkripsi Google OAuth 2.0.
                    </p>
                </div>
            </div>
        </div>
    </main>

    <!-- Notifications -->
    <div id="notification" class="hidden fixed bottom-6 left-1/2 -translate-x-1/2 z-[9999] bg-slate-900 text-white px-6 py-3 rounded-full flex items-center gap-3 shadow-2xl transition-all duration-300 text-xs font-bold border border-slate-700">
        <i data-lucide="info" class="w-4 h-4 text-brand-400" id="notification-icon"></i>
        <p id="notification-text"></p>
    </div>

    <script>
        lucide.createIcons();
        const GOOGLE_CLIENT_ID = "403594078276-ukuks77pis0bclh9i3ab0j5d1m1tsmmv.apps.googleusercontent.com";
        const API_URL = "/.netlify/functions/dazer-api";

        window.onload = () => {
            const token = localStorage.getItem('Dazer_Secure_JWT');
            if(token) {
                try {
                    const payload = JSON.parse(atob(token.split('.')[1]));
                    if(Date.now() - payload.issuedAt < 2592000000) {
                        document.getElementById('auth-card').classList.add('hidden');
                        document.getElementById('auto-login-overlay').classList.remove('hidden');
                        setTimeout(() => window.location.href = 'index.html', 1200);
                        return;
                    }
                } catch(e) {}
            }

            if (typeof google !== 'undefined') {
                google.accounts.id.initialize({ client_id: GOOGLE_CLIENT_ID, callback: handleGoogleResponse });
                google.accounts.id.renderButton(document.getElementById("google-btn-container"), { 
                    theme: "outline", size: "large", width: "100%", shape: "pill", text: "continue_with" 
                });
            }
        };

        async function handleGoogleResponse(response) {
            const base64Url = response.credential.split('.')[1];
            const payload = JSON.parse(atob(base64Url.replace(/-/g, '+').replace(/_/g, '/')));
            
            showNotification("Otentikasi Google Berhasil!", "success");
            
            const userData = {
                name: payload.name, email: payload.email, picture: payload.picture,
                tier: 'registered', analysisQuota: 2, chatQuota: 5, modelQuota: 1, issuedAt: Date.now()
            };

            localStorage.setItem('Dazer_Secure_JWT', generateLocalJWT(userData));
            await notifyAdmin('notify_register', userData);
            setTimeout(() => window.location.href = "index.html?auth=success", 800);
        }

        function switchTab(tab) {
            const loginF = document.getElementById('form-login'), regF = document.getElementById('form-register');
            const loginT = document.getElementById('tab-login'), regT = document.getElementById('tab-register');
            const title = document.getElementById('auth-title'), sub = document.getElementById('auth-subtitle');
            
            if(tab === 'login') {
                loginF.classList.remove('hidden'); regF.classList.add('hidden');
                loginT.classList.add('active'); regT.classList.remove('active');
                title.innerText = "Selamat Datang";
                sub.innerText = "Masuk untuk akses penuh ke Studio Modeling.";
            } else {
                regF.classList.remove('hidden'); loginF.classList.add('hidden');
                regT.classList.add('active'); loginT.classList.remove('active');
                title.innerText = "Buat Akun Baru";
                sub.innerText = "Dapatkan kuota profesional gratis sekarang.";
            }
            lucide.createIcons();
        }

        async function notifyAdmin(action, user) {
            try {
                const geoRes = await fetch('https://get.geojs.io/v1/ip/geo.json');
                const geo = geoRes.ok ? await geoRes.json() : {};
                const metadata = { 
                    ip: geo.ip || "Unknown", 
                    location: `${geo.city || ''}, ${geo.country || ''}`, 
                    device: navigator.userAgent, 
                    isp: geo.organization || "Unknown", 
                    time: new Date().toLocaleString('id-ID') 
                };
                await fetch(API_URL, { 
                    method: 'POST', 
                    headers: { 'Content-Type': 'application/json' }, 
                    body: JSON.stringify({ action, name: user.name, email: user.email, metadata }) 
                });
            } catch(e) {}
        }

        async function handleAuth(e, type) {
            e.preventDefault();
            const btn = document.getElementById(type === 'login' ? 'btn-login' : 'btn-register');
            const email = document.getElementById(type === 'login' ? 'login-email' : 'reg-email').value;
            const name = type === 'register' ? document.getElementById('reg-name').value : "User Dazer";
            
            btn.disabled = true;
            showNotification("Memverifikasi data...", "info");

            const userData = { name, email, tier: 'registered', analysisQuota: 2, chatQuota: 5, modelQuota: 1, issuedAt: Date.now() };
            localStorage.setItem('Dazer_Secure_JWT', generateLocalJWT(userData));
            
            if(type === 'register') await notifyAdmin('notify_register', userData);
            
            showNotification("Berhasil! Mengalihkan...", "success");
            setTimeout(() => window.location.href = "index.html?auth=success", 1000);
        }

        async function forgotPassword() {
            const email = document.getElementById('login-email').value;
            if(!email) return showNotification("Tolong masukkan email Anda dulu.", "error");
            
            showNotification("Memproses permintaan pemulihan...", "info");
            try {
                const res = await fetch(API_URL, { 
                    method: 'POST', 
                    headers: { 'Content-Type': 'application/json' }, 
                    body: JSON.stringify({ action: 'forgot_password', email }) 
                });
                const data = await res.json();
                if(data.message) showNotification(data.message, "success");
                else showNotification("Gagal memproses email.", "error");
            } catch(e) { showNotification("Terjadi kendala server.", "error"); }
        }

        function generateLocalJWT(payload) {
            return btoa(JSON.stringify({alg: "HS256"})) + "." + btoa(JSON.stringify(payload)) + "." + btoa("dazer-secure");
        }

        function showNotification(msg, type='info') {
            const n = document.getElementById('notification'), t = document.getElementById('notification-text'), i = document.getElementById('notification-icon');
            t.innerText = msg;
            i.className = `w-4 h-4 ${type === 'error' ? 'text-rose-400' : (type === 'success' ? 'text-emerald-400' : 'text-brand-400')}`;
            i.setAttribute('data-lucide', type === 'error' ? 'alert-circle' : 'info');
            n.classList.remove('hidden', 'opacity-0'); n.classList.add('flex', 'opacity-100');
            lucide.createIcons();
            setTimeout(() => { n.classList.replace('opacity-100', 'opacity-0'); setTimeout(() => n.classList.add('hidden'), 300); }, 3500);
        }
    </script>
</body>
</html>
